# nginx/fleetops.conf

# Redirigir HTTP → HTTPS
server {
    listen 80;
    server_name fleetops.tudominio.com;   # ← tu dominio
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name fleetops.tudominio.com;   # ← tu dominio

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # ── Frontend React ───────────────────────────────────────────────
    location / {
        proxy_pass         http://web:80;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── REST API ─────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api:3000/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 10m;  # para upload de claves SSH
    }

    # ── WebSocket SSH Terminal ────────────────────────────────────────
    # CRÍTICO: sin este bloque el terminal SSH no va a funcionar
    location /ws/ssh {
        proxy_pass              http://api:3000/ws/ssh;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade    $http_upgrade;
        proxy_set_header        Connection "Upgrade";
        proxy_set_header        Host       $host;
        proxy_read_timeout      3600s;   # 1h máximo por sesión
        proxy_send_timeout      3600s;
        proxy_buffering         off;
    }
}
